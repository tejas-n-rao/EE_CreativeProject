services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carbon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: carbon-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/carbon
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./data:/workspace/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: carbon-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages/shared:/workspace/packages/shared
      - /workspace/apps/web/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
